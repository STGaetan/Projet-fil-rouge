version: '3.8'


services:

  php:
      build: .
      volumes: 
           - ./:/var/www/html
           - /var/log/apache2/app:/var/log/apache2/
      ports:
           - 8080:80

  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ma_base
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
    volumes:
      - db_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d   # exécute init.sql au démarrage
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
    ports:
      - "8084:80"

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: always
    depends_on:
      - mariadb
    ports:

      - "8081:8080"

  web:
    image: nginx
    volumes:
      - ./templates:/etc/nginx/templates
    ports:
      - "8082:80"
    environment:
      - NGINX_HOST=foobar.com
      - NGINX_PORT=80




volumes:
  db_data:
